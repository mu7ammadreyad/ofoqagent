name: OFOQ Agent — Daily Publish

on:
  # 03:30 UTC = 05:30 Cairo (UTC+2, no DST)
  schedule:
    - cron: '30 3 * * *'

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      uid:
        description: 'Firebase UID (optional — triggers for specific user)'
        required: false

jobs:
  daily-publish:
    name: Daily Publish for All Users
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Daily Publisher
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TARGET_UID:               ${{ github.event.inputs.uid }}
        run: node src/daily-publish.js

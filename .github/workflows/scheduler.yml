name: OFOQ Scheduler — Check Due Tasks

# يشتغل كل ساعة تقريباً — يقرأ Firestore ويُطلق agent-chat لكل مهمة حانت
# لا يعرف أي شيء عن المستخدمين — كل المنطق في Firestore

on:
  schedule:
    - cron: '0 * * * *'   # كل ساعة UTC
  workflow_dispatch:       # للتجربة اليدوية

jobs:
  check-schedules:
    name: Check Due Schedules
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Scheduler
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_TOKEN_FOR_DISPATCH: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:             ${{ github.repository_owner }}
          GITHUB_AGENT_REPO:        ${{ github.event.repository.name }}
        run: node src/scheduler.js
